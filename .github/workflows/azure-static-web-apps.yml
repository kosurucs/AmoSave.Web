name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build, lint, test, and deploy on push to main or open/updated PRs
  # ─────────────────────────────────────────────────────────────────────────────
  build_and_deploy:
    name: Build and Deploy
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Run tests
        run: yarn test --run

      - name: Build
        run: yarn build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Deploy to Azure Static Web Apps (production)
        if: github.event_name == 'push'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Pre-built app — Vite outputs to dist/; skip Azure's own build step
          app_location: dist
          skip_app_build: true
          skip_deploy_on_missing_secrets: true

      - name: Deploy to Azure Static Web Apps (PR preview)
        if: github.event_name == 'pull_request'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          deployment_environment: pr-${{ github.event.pull_request.number }}
          skip_deploy_on_missing_secrets: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Clean up the preview environment when a PR is closed
  # ─────────────────────────────────────────────────────────────────────────────
  close_pull_request:
    name: Close PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Close Pull Request preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          skip_deploy_on_missing_secrets: true
